	<h1>Contato</h1>

	<h2>Fale Conosco</h2>
	<p>Utilize o formulário abaixo para entrar em contato, enviar dúvidas ou sugestões sobre o site.</p>
	<div class="formulario">
	<form>

		<label>Nome:</label><br>
		<input type="text" name="nome" placeholder="Digite seu nome"><br><br>

		<label>Email:</label><br>
		<input type="email" name="email" placeholder="Digite seu email"><br><br>

		<label>Assunto:</label><br>
		<input type="text" name="assunto" placeholder="Digite o assunto"><br><br>

		<label>Mensagem:</label><br>
		<textarea name="mensagem" rows="5" cols="30" placeholder="Digite sua mensagem"></textarea><br><br>

		<label>Tipo de contato:</label><br>
		<input type="radio" name="tipo"> Dúvida<br>
		<input type="radio" name="tipo"> Sugestão<br>
		<input type="radio" name="tipo"> Outro<br><br>

		<label>Receber resposta por email:</label>
		<input type="checkbox"><br><br>

		<button type="submit">Enviar</button>

	</form>
	</div>
